<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Parking Spotter • Live Traffic Cams</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; max-width: 640px; width: 92%; border-radius: 16px; overflow: hidden; }
        .camera-img { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden">
    <div class="flex h-screen">
        <div class="w-80 bg-gray-800 p-6 flex flex-col">
            <h1 class="text-3xl font-bold mb-1">🚗 NYC Parking Spotter</h1>
            <p class="text-gray-400 mb-4">Live NYC DOT cams — spot open curb parking visually</p>

            <input id="search" type="text" placeholder="Search street..." 
                   class="w-full px-4 py-3 bg-gray-700 rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

            <button onclick="loadCameras()" 
                    class="mb-6 w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-2xl text-sm font-medium">
                🔄 Retry Loading Cameras
            </button>

            <div class="mb-3 font-medium text-sm">Borough Filters</div>
            <div id="borough-filters" class="flex flex-wrap gap-2 mb-6"></div>

            <div class="text-xs text-gray-400 mb-2">Cameras: <span id="cam-count" class="font-mono">0</span></div>
            <div id="camera-list" class="flex-1 overflow-auto text-sm pr-2 space-y-1"></div>

            <div class="text-[10px] text-gray-500 mt-auto pt-6">
                Powered by NYC DOT • Via CORS proxy for GitHub Pages
            </div>
        </div>

        <div id="map" class="flex-1"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="p-4 border-b bg-gray-50 flex justify-between">
                <div>
                    <div id="modal-name" class="font-bold text-gray-900"></div>
                    <div id="modal-borough" class="text-sm text-gray-500"></div>
                </div>
                <button onclick="closeModal()" class="text-4xl text-gray-400 hover:text-black">×</button>
            </div>
            <div id="image-container" class="bg-black min-h-[320px] flex items-center justify-center p-2">
                Loading live image...
            </div>
            <div class="p-4 bg-white flex gap-3">
                <button onclick="refreshImage()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-2xl">🔄 Refresh Image</button>
                <div id="last-updated" class="text-xs text-gray-400 self-center"></div>
            </div>
        </div>
    </div>

    <script>
        let map, cameras = [], markers = {}, currentCam = null, refreshInterval = null;
        const boroughColors = { "Manhattan": "#f97316", "Brooklyn": "#10b981", "Queens": "#3b82f6", "Bronx": "#8b5cf6", "Staten Island": "#ec4899" };

        const CORS_PROXY = "https://corsproxy.io/?";

        async function loadCameras() {
            const countEl = document.getElementById('cam-count');
            countEl.textContent = 'Loading...';
            document.getElementById('camera-list').innerHTML = '<div class="p-8 text-center text-gray-400">Fetching cameras...</div>';

            try {
                const res = await fetch(CORS_PROXY + encodeURIComponent('https://webcams.nyctmc.org/api/cameras'));
                if (!res.ok) throw new Error('HTTP ' + res.status);

                cameras = await res.json();

                countEl.textContent = cameras.length;
                initBoroughFilters();
                initMap();
                renderList();
            } catch (err) {
                console.error(err);
                countEl.textContent = 'Failed';
                document.getElementById('camera-list').innerHTML = `
                    <div class="p-6 text-red-400">
                        Still blocked by CORS.<br><br>
                        Try clicking "Retry" again.<br>
                        If it keeps failing, we can switch to a different proxy or backend.
                    </div>`;
            }
        }

        function initBoroughFilters() {
            const boroughs = [...new Set(cameras.map(c => c.area))].sort();
            const container = document.getElementById('borough-filters');
            container.innerHTML = '';
            boroughs.forEach(b => {
                const btn = document.createElement('button');
                btn.textContent = b;
                btn.className = `px-4 py-1 text-sm rounded-2xl bg-gray-700 hover:bg-gray-600 transition`;
                btn.onclick = () => { btn.classList.toggle('bg-white'); btn.classList.toggle('text-gray-900'); renderList(); updateMarkers(); };
                container.appendChild(btn);
            });
        }

        function initMap() {
            if (map) map.remove();
            map = L.map('map').setView([40.7128, -74.0060], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    map.setView([p.coords.latitude, p.coords.longitude], 13);
                });
            }
            updateMarkers();
        }

        function updateMarkers() {
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            cameras.filter(c => c.isOnline === "true" || c.isOnline === true).forEach(cam => {
                const color = boroughColors[cam.area] || '#64748b';
                const marker = L.circleMarker([cam.latitude, cam.longitude], {
                    radius: 7, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.85
                }).addTo(map);
                marker.bindTooltip(cam.name);
                marker.on('click', () => showCamera(cam));
                markers[cam.id] = marker;
            });
        }

        function renderList() {
            const container = document.getElementById('camera-list');
            const term = (document.getElementById('search').value || '').toLowerCase().trim();

            const filtered = cameras.filter(c => 
                (c.isOnline === "true" || c.isOnline === true) &&
                (!term || c.name.toLowerCase().includes(term))
            );

            container.innerHTML = filtered.slice(0, 100).map(cam => `
                <div onclick="showCameraById('${cam.id}')" class="p-3 hover:bg-gray-700 rounded-2xl cursor-pointer flex gap-3">
                    <div class="w-3 h-3 mt-1 rounded-full" style="background:${boroughColors[cam.area] || '#64748b'}"></div>
                    <div class="flex-1">
                        <div class="text-sm">${cam.name}</div>
                        <div class="text-xs text-gray-400">${cam.area}</div>
                    </div>
                </div>
            `).join('');
        }

        window.showCameraById = function(id) {
            const cam = cameras.find(c => c.id === id);
            if (cam) showCamera(cam);
        };

        function showCamera(cam) {
            currentCam = cam;
            document.getElementById('modal-name').textContent = cam.name;
            document.getElementById('modal-borough').textContent = cam.area || '';
            document.getElementById('modal').style.display = 'flex';
            loadImage(cam);
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => loadImage(cam), 10000);
        }

        function loadImage(cam) {
            const ts = Date.now();
            const container = document.getElementById('image-container');
            container.innerHTML = `
                <img src="https://webcams.nyctmc.org/api/cameras/${cam.id}/image?t=${ts}" 
                     class="camera-img" onload="document.getElementById('last-updated').textContent='Just now'">
            `;
        }

        function refreshImage() {
            if (currentCam) loadImage(currentCam);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            if (refreshInterval) clearInterval(refreshInterval);
        }

        document.getElementById('search').addEventListener('input', renderList);

        window.onload = loadCameras;
    </script>
</body>
</html>
