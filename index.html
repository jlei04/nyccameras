<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Parking Spotter • Live Traffic Cams</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; max-width: 640px; width: 92%; border-radius: 16px; overflow: hidden; }
        .camera-img { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-80 bg-gray-800 p-6 flex flex-col">
            <h1 class="text-3xl font-bold mb-2">🚗 NYC Parking Spotter</h1>
            <p class="text-gray-400 mb-6">Live DOT cams • Spot open curb parking</p>

            <input id="search" type="text" placeholder="Search street..." 
                   class="w-full px-4 py-3 bg-gray-700 rounded-2xl mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500">

            <button onclick="loadCameras()" 
                    class="mb-6 px-5 py-2 bg-blue-600 hover:bg-blue-700 rounded-2xl text-sm font-medium">
                🔄 Retry Loading Cameras
            </button>

            <div class="text-xs text-gray-400 mb-2">Cameras: <span id="cam-count">Loading...</span></div>
            <div id="camera-list" class="flex-1 overflow-auto text-sm space-y-1"></div>

            <div class="text-[10px] text-gray-500 mt-6">
                Powered by public NYC DOT (webcams.nyctmc.org)
            </div>
        </div>

        <div id="map" class="flex-1"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="p-4 border-b bg-gray-50 flex justify-between">
                <div>
                    <div id="modal-name" class="font-bold text-gray-900"></div>
                    <div id="modal-area" class="text-sm text-gray-500"></div>
                </div>
                <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-black">×</button>
            </div>
            <div id="image-container" class="bg-black p-2 min-h-[320px] flex items-center justify-center">
                Loading live image...
            </div>
            <div class="p-4 bg-white flex gap-3">
                <button onclick="refreshImage()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl font-medium">🔄 Refresh Image</button>
                <div id="last-updated" class="text-xs text-gray-400 self-center"></div>
            </div>
        </div>
    </div>

    <script>
        let map, cameras = [], markers = {}, currentCam = null;
        let refreshTimer = null;

        async function loadCameras() {
            const countEl = document.getElementById('cam-count');
            countEl.textContent = 'Loading...';
            document.getElementById('camera-list').innerHTML = '<div class="p-4 text-gray-400">Fetching cameras from NYC DOT...</div>';

            try {
                const res = await fetch('https://webcams.nyctmc.org/api/cameras', { cache: 'no-cache' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                cameras = await res.json();

                countEl.textContent = cameras.length + ' loaded';
                initMap();
                renderList();
            } catch (err) {
                console.error(err);
                countEl.textContent = 'Failed';
                document.getElementById('camera-list').innerHTML = `
                    <div class="p-4 text-red-400">
                        Could not load cameras.<br><br>
                        <strong>Common fixes:</strong><br>
                        • Hard refresh (Ctrl/Cmd + Shift + R)<br>
                        • Try again in 30 seconds<br>
                        • Check if https://webcams.nyctmc.org/api/cameras opens in a new tab
                    </div>`;
            }
        }

        function initMap() {
            if (map) map.remove();
            map = L.map('map').setView([40.7128, -74.0060], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Try to center on user's location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    map.setView([pos.coords.latitude, pos.coords.longitude], 13);
                });
            }

            updateMarkers();
        }

        function updateMarkers() {
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            cameras.filter(c => c.isOnline === "true" || c.isOnline === true).forEach(cam => {
                const marker = L.circleMarker([cam.latitude, cam.longitude], {
                    radius: 7,
                    fillColor: '#3b82f6',
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 0.85
                }).addTo(map);

                marker.bindTooltip(cam.name);
                marker.on('click', () => showCamera(cam));
                markers[cam.id] = marker;
            });
        }

        function renderList() {
            const container = document.getElementById('camera-list');
            const term = (document.getElementById('search').value || '').toLowerCase();

            const filtered = cameras
                .filter(c => (c.isOnline === "true" || c.isOnline === true) &&
                             (!term || c.name.toLowerCase().includes(term)))
                .slice(0, 100);

            container.innerHTML = filtered.map(cam => `
                <div onclick="showCameraById('${cam.id}')" 
                     class="p-3 hover:bg-gray-700 rounded-2xl cursor-pointer flex gap-3">
                    <div class="flex-1">
                        <div class="text-sm">${cam.name}</div>
                        <div class="text-xs text-gray-400">${cam.area || 'NYC'}</div>
                    </div>
                </div>
            `).join('');
        }

        window.showCameraById = function(id) {
            const cam = cameras.find(c => c.id === id);
            if (cam) showCamera(cam);
        };

        function showCamera(cam) {
            currentCam = cam;
            document.getElementById('modal-name').textContent = cam.name;
            document.getElementById('modal-area').textContent = cam.area || '';
            document.getElementById('modal').style.display = 'flex';
            loadImage(cam);

            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(() => loadImage(cam), 10000);
        }

        function loadImage(cam) {
            const ts = Date.now();
            const container = document.getElementById('image-container');
            container.innerHTML = `
                <img src="https://webcams.nyctmc.org/api/cameras/${cam.id}/image?t=${ts}" 
                     class="camera-img" onload="document.getElementById('last-updated').textContent='Just now'">
            `;
        }

        function refreshImage() {
            if (currentCam) loadImage(currentCam);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            if (refreshTimer) clearInterval(refreshTimer);
        }

        document.getElementById('search').addEventListener('input', renderList);

        // Start the app
        window.onload = loadCameras;
    </script>
</body>
</html>
