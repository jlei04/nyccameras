<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Parking Spotter • Live Traffic Cams</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 50; }
        .modal-content { background: white; max-width: 640px; width: 90%; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
        .camera-img { max-width: 100%; height: auto; display: block; }
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="flex h-screen">
        <!-- Sidebar (same as before) -->
        <div class="w-80 bg-gray-800 p-6 flex flex-col">
            <h1 class="text-3xl font-bold mb-2">🚗 NYC Parking Spotter</h1>
            <p class="text-gray-400 mb-6">Live NYC DOT cams • Spot open parking visually</p>
            
            <input id="search" type="text" placeholder="Search street..." 
                   class="w-full px-4 py-3 bg-gray-700 rounded-xl mb-6 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <div class="mb-4 font-medium">Borough Filters</div>
            <div id="borough-filters" class="flex flex-wrap gap-2 mb-8"></div>
            
            <div class="text-xs text-gray-400 mb-2">Cameras: <span id="cam-count" class="font-mono">Loading...</span></div>
            <div class="flex-1 overflow-auto text-sm" id="camera-list"></div>
            
            <div class="text-xs text-gray-500 mt-auto pt-6">
                Powered by public NYC DOT data (webcams.nyctmc.org)<br>
                Images refresh every ~10s • Visual check only
            </div>
        </div>
        
        <div id="map" class="flex-1"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="p-4 border-b flex justify-between bg-gray-50">
                <div>
                    <div id="modal-name" class="font-semibold text-gray-900"></div>
                    <div id="modal-borough" class="text-sm text-gray-500"></div>
                </div>
                <button onclick="closeModal()" class="text-3xl leading-none text-gray-400 hover:text-black">×</button>
            </div>
            <div id="modal-image-container" class="loading">Loading live image...</div>
            <div class="p-4 bg-white flex gap-3">
                <button onclick="refreshImage()" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-2xl text-white font-medium">🔄 Refresh Image</button>
                <div id="last-updated" class="text-xs text-gray-400 self-center"></div>
            </div>
        </div>
    </div>

    <script>
        let map, cameras = [], markers = {}, currentCamera = null;
        let imageInterval = null;
        const boroughColors = { "Manhattan": "#f97316", "Brooklyn": "#10b981", "Queens": "#3b82f6", "Bronx": "#8b5cf6", "Staten Island": "#ec4899" };

        async function loadCameras() {
            const countEl = document.getElementById('cam-count');
            countEl.textContent = 'Loading...';
            try {
                const res = await fetch('https://webcams.nyctmc.org/api/cameras');
                if (!res.ok) throw new Error('Network error');
                cameras = await res.json();
                
                countEl.textContent = cameras.length;
                initBoroughFilters();
                initMap();
                renderList();
            } catch (e) {
                console.error(e);
                countEl.textContent = 'Error';
                alert('Failed to load cameras. Make sure you are running this via a local server (npx serve) or on GitHub Pages, not as a local file.');
            }
        }

        function initBoroughFilters() {
            const uniqueBoroughs = [...new Set(cameras.map(c => c.area))].sort();
            const container = document.getElementById('borough-filters');
            container.innerHTML = '';
            uniqueBoroughs.forEach(b => {
                const btn = document.createElement('button');
                btn.textContent = b;
                btn.className = `px-4 py-2 rounded-2xl text-sm transition-colors bg-gray-700 hover:bg-gray-600`;
                btn.onclick = () => { /* toggle logic - you can expand this */ renderList(); updateMapMarkers(); };
                container.appendChild(btn);
            });
        }

        function initMap() {
            map = L.map('map').setView([40.7128, -74.0060], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            updateMapMarkers();
        }

        function updateMapMarkers() {
            Object.values(markers).forEach(m => m.remove());
            markers = {};

            cameras.filter(c => c.isOnline === "true" || c.isOnline === true).forEach(cam => {
                const color = boroughColors[cam.area] || '#64748b';
                const marker = L.circleMarker([cam.latitude, cam.longitude], {
                    radius: 7, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.85
                }).addTo(map);
                marker.bindTooltip(cam.name);
                marker.on('click', () => showCameraModal(cam));
                markers[cam.id] = marker;
            });
        }

        function renderList() {
            // Simplified list rendering - add search/filter as needed
            const container = document.getElementById('camera-list');
            container.innerHTML = cameras.slice(0, 50).map(cam => `
                <div onclick="showCameraModalFromList('${cam.id}')" 
                     class="p-3 hover:bg-gray-700 rounded-2xl cursor-pointer flex gap-3 items-center">
                    <div class="w-3 h-3 rounded-full" style="background:${boroughColors[cam.area]||'#64748b'}"></div>
                    <div>
                        <div class="text-sm">${cam.name}</div>
                        <div class="text-xs text-gray-400">${cam.area}</div>
                    </div>
                </div>
            `).join('');
        }

        window.showCameraModalFromList = function(id) {
            const cam = cameras.find(c => c.id === id);
            if (cam) showCameraModal(cam);
        };

        function showCameraModal(cam) {
            currentCamera = cam;
            document.getElementById('modal-name').textContent = cam.name;
            document.getElementById('modal-borough').textContent = cam.area;
            document.getElementById('modal').style.display = 'flex';
            loadLiveImage(cam);
            if (imageInterval) clearInterval(imageInterval);
            imageInterval = setInterval(() => loadLiveImage(cam), 10000);
        }

        function loadLiveImage(cam) {
            const container = document.getElementById('modal-image-container');
            container.innerHTML = `<img id="modal-img" class="camera-img" src="https://webcams.nyctmc.org/api/cameras/${cam.id}/image?t=${Date.now()}" alt="Live feed">`;
            document.getElementById('last-updated').textContent = 'Just now';
        }

        function refreshImage() {
            if (currentCamera) loadLiveImage(currentCamera);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            if (imageInterval) clearInterval(imageInterval);
        }

        document.getElementById('search').addEventListener('input', renderList);

        window.onload = loadCameras;
    </script>
</body>
</html>
